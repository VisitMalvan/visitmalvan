<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Plan Your Malvan Trip | VisitMalvan</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div id="header"></div>


<section class="contact-page">

<div class="container">

<h1>Plan Your Malvan Trip</h1>

<p>
Tell us about your trip and Smita Hatle will help you plan
the best stay and experiences in Malvan, Tarkarli or Devbagh.
</p>

<form class="contact-form">

<input type="text" placeholder="Your Name" required>

<input type="tel" placeholder="Phone / WhatsApp" required>

<label>Travel Date</label>
<input type="date">

<label>Number of Guests</label>
<input type="number" min="1" placeholder="Guests">

<label>Destination</label>
<select>
<option>Malvan</option>
<option>Tarkarli</option>
<option>Devbagh</option>
</select>

<label>Service Required</label>
<select>
<option>Hotel / Homestay</option>
<option>Tour Package</option>
<option>Water Sports</option>
<option>Dolphin Safari</option>
<option>Destination Wedding</option>
<option>Local Sightseeing</option>
</select>

<label>Budget Range</label>
<select>
<option>Budget</option>
<option>Standard</option>
<option>Luxury</option>
</select>

<textarea placeholder="Tell us about your trip"></textarea>

<button type="submit">Send Enquiry</button>

</form>

</div>

</section>


<div id="footer"></div>

<script src="js/include.js"></script>

</body>
</html>
