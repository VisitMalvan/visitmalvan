<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Plan Your Malvan Trip | VisitMalvan</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div id="header"></div>


<section class="contact-section">

<div class="container">

<h1>Contact Us</h1>

<p class="contact-intro">
Have questions about your Malvan trip?  
Fill the form below or contact us on WhatsApp.
</p>

<form
class="enquiry-form"
action="https://formspree.io/f/mvzvkknq"
method="POST">

<input
type="hidden"
name="_subject"
value="New Enquiry from VisitMalvan Contact Page">

<!-- Name + Phone -->

<div class="form-row">

<input
type="text"
name="name"
placeholder="Your Name"
required>

<input
type="tel"
name="phone"
placeholder="Phone / WhatsApp"
required>

</div>

<!-- Destination + Service -->

<div class="form-row">

<select name="destination" required>

<option value="">Select Destination</option>

<option>Malvan</option>
<option>Tarkarli</option>
<option>Devbagh</option>

</select>

<select name="service" required>

<option value="">Service Required</option>

<option>Hotel / Homestay</option>
<option>Tour Package</option>
<option>Water Sports</option>
<option>Dolphin Safari</option>
<option>Local Sightseeing</option>
<option>Destination Wedding</option>

</select>

</div>

<!-- Travel Date -->

<label>Travel Date</label>

<input
type="date"
name="travel_date"
required>

<!-- Number of Persons -->

<input
type="number"
name="persons"
placeholder="Number of Persons"
min="1"
required>

<!-- Message -->

<textarea
name="message"
placeholder="Tell us about your trip"
required>
</textarea>

<!-- Submit -->

<button type="submit">
Send Enquiry
</button>

</form>

</div>

</section>


<div id="footer"></div>

<script src="js/include.js"></script>

</body>
</html>
